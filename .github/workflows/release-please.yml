name: release-please

# Opens/updates a release PR from Conventional Commits on main. Merging it
# bumps the version, updates CHANGELOG.md, tags the release, and creates a
# GitHub Release — no manual changelog copying needed.
on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
